<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}KmerLab{% endblock %}</title>
  <meta name="description" content="Local k-mer analysis dashboard for FASTA/FASTQ files. Runs entirely on your machine.">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ url_for('index') }}" aria-label="KmerLab home">
        <span class="brand-tiles" aria-hidden="true">
          <span class="tile-a">A</span><span class="tile-c">C</span><span class="tile-g">G</span><span class="tile-t">T</span>
        </span>
        <span class="brand-word"><b>Kmer</b><i>Lab</i></span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('index') }}" class="{% block nav_home %}{% endblock %}">Analyzer</a>
        <a href="{{ url_for('compare_page') }}" class="{% block nav_compare %}{% endblock %}">Compare</a>
        <a href="{{ url_for('about_page') }}" class="{% block nav_about %}{% endblock %}">Method</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>
        <span class="privacy"><span class="dot"></span> Runs 100% locally</span>
        &nbsp;·&nbsp; KmerLab v{{ version }} &nbsp;·&nbsp;
        No cloud, no database, no login, no API keys. Your sequence data never leaves this machine.
      </p>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
